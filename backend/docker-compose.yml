services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arch-explainer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arch_explainer
    ports:
      - "5433:5432"
    volumes:
      - arch-explainer-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  arch-explainer-pgdata: